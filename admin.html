<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>B.O.L.D — Director Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#00ff41;font-family:'Share Tech Mono',monospace;min-height:100vh;padding:20px;}

/* LOCK */
#lock{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;}
#lock h1{font-family:'Orbitron',monospace;font-size:36px;color:#00ff41;letter-spacing:6px;}
#lock p{color:#333;font-size:13px;letter-spacing:2px;}
#lock input{background:#000;border:1px solid #00ff41;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:20px;padding:12px 20px;text-align:center;width:220px;outline:none;letter-spacing:6px;}
#lock button{background:#000;border:1px solid #00ff41;color:#00ff41;font-family:'Orbitron',monospace;font-size:13px;letter-spacing:4px;padding:12px 40px;cursor:pointer;transition:all 0.2s;}
#lock button:hover{background:#00ff41;color:#000;}
#lock .error{color:#ff3333;font-size:13px;display:none;}

/* DASHBOARD */
#dash{display:none;}
.topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #111;padding-bottom:16px;margin-bottom:32px;flex-wrap:wrap;gap:12px;}
.topbar h1{font-family:'Orbitron',monospace;font-size:28px;color:#00ff41;letter-spacing:4px;}
.topbar .sub{font-size:11px;color:#333;letter-spacing:2px;}

.stats{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:32px;}
.stat{border:1px solid #111;padding:16px 24px;text-align:center;min-width:120px;}
.stat-num{font-family:'Orbitron',monospace;font-size:40px;color:#00ff41;}
.stat-label{font-size:10px;color:#333;letter-spacing:3px;margin-top:4px;}

.tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid #111;}
.tab{padding:10px 28px;font-size:12px;letter-spacing:3px;cursor:pointer;border-bottom:2px solid transparent;color:#333;transition:all 0.2s;}
.tab.active{color:#00ff41;border-bottom-color:#00ff41;}

.add-btn{background:#000;border:1px solid #00ff41;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:3px;padding:10px 24px;cursor:pointer;margin-bottom:20px;transition:all 0.2s;}
.add-btn:hover{background:#00ff41;color:#000;}

#addForm{border:1px solid #111;padding:20px;margin-bottom:24px;display:none;}
#addForm h3{font-family:'Orbitron',monospace;font-size:14px;color:#00ff41;letter-spacing:3px;margin-bottom:16px;}
#addForm input,#addForm select,#addForm textarea{width:100%;background:#000;border:none;border-bottom:1px solid #333;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 4px;margin-bottom:12px;outline:none;}
#addForm textarea{min-height:60px;border:1px solid #222;border-bottom:1px solid #333;padding:8px;}
#addForm .save{background:#00ff41;border:none;color:#000;font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;padding:10px 28px;cursor:pointer;}

.card{border:1px solid #111;padding:16px 20px;margin-bottom:12px;transition:border-color 0.2s;}
.card:hover{border-color:#222;}
.card-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.card-name{font-family:'Orbitron',monospace;font-size:15px;color:#00ff41;}
.card-rank{font-size:11px;letter-spacing:3px;padding:3px 10px;border:1px solid;}
.card-detail{font-size:12px;color:#333;margin-bottom:3px;line-height:1.6;}
.card-detail span{color:#555;}
.card-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.act-btn{background:#000;border:1px solid #222;color:#555;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;padding:5px 14px;cursor:pointer;transition:all 0.2s;}
.act-btn:hover{border-color:#00ff41;color:#00ff41;}
.act-btn.del:hover{border-color:#ff3333;color:#ff3333;}
.act-btn.active{border-color:#00ff41;color:#00ff41;}

.empty{text-align:center;color:#222;font-size:14px;letter-spacing:3px;padding:60px 20px;}
</style>
</head>
<body>

<div id="lock">
  <div style="font-family:'Orbitron',monospace;font-size:48px;color:#00ff41;">B.O.L.D</div>
  <h1>DIRECTOR ACCESS</h1>
  <p>CLASSIFIED — OLIVER VO ONLY</p>
  <input type="password" id="pw" placeholder="••••••" onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">ENTER →</button>
  <div class="error" id="err">ACCESS DENIED. TRY AGAIN.</div>
</div>

<div id="dash">
  <div class="topbar">
    <div>
      <h1>DIRECTOR PANEL</h1>
      <div class="sub">B.O.L.D · OLIVER VO · LADERA RANCH, CA</div>
    </div>
    <a href="index.html" style="color:#333;font-size:11px;letter-spacing:3px;text-decoration:none;">← BACK TO BASE</a>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="totalAgents">0</div><div class="stat-label">AGENTS</div></div>
    <div class="stat"><div class="stat-num" id="totalCases">0</div><div class="stat-label">CASES</div></div>
    <div class="stat"><div class="stat-num" id="activeCases">0</div><div class="stat-label">ACTIVE</div></div>
    <div class="stat"><div class="stat-num" id="solvedCases">0</div><div class="stat-label">SOLVED</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('agents')">AGENTS</div>
    <div class="tab" onclick="switchTab('cases')">CASES</div>
  </div>

  <!-- AGENTS TAB -->
  <div id="agentsTab">
    <button class="add-btn" onclick="toggleForm()">+ ADD AGENT MANUALLY</button>
    <div id="addForm">
      <h3>ADD AGENT</h3>
      <input type="text" id="a-name" placeholder="Real name">
      <input type="text" id="a-code" placeholder="Code name">
      <input type="text" id="a-age" placeholder="Age">
      <input type="text" id="a-school" placeholder="School">
      <input type="text" id="a-location" placeholder="City & State">
      <select id="a-rank">
        <option value="RECRUIT">LEVEL 01 — RECRUIT</option>
        <option value="AGENT">LEVEL 02 — AGENT</option>
        <option value="SPECIALIST">LEVEL 03 — SPECIALIST</option>
        <option value="COMMANDER">LEVEL 04 — COMMANDER</option>
      </select>
      <textarea id="a-why" placeholder="Why they joined (optional)"></textarea>
      <button class="save" onclick="addAgent()">SAVE AGENT</button>
    </div>
    <div id="agentsList"></div>
  </div>

  <!-- CASES TAB -->
  <div id="casesTab" style="display:none;">
    <button class="add-btn" onclick="toggleCaseForm()">+ ADD CASE MANUALLY</button>
    <div id="addCaseForm" style="display:none;" class="card">
      <h3 style="font-family:'Orbitron',monospace;font-size:14px;color:#00ff41;letter-spacing:3px;margin-bottom:16px;">ADD CASE</h3>
      <input type="text" id="c-name" placeholder="Victim name (first only)" style="width:100%;background:#000;border:none;border-bottom:1px solid #333;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 4px;margin-bottom:12px;outline:none;">
      <input type="text" id="c-school" placeholder="School" style="width:100%;background:#000;border:none;border-bottom:1px solid #333;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 4px;margin-bottom:12px;outline:none;">
      <input type="text" id="c-location" placeholder="City & State" style="width:100%;background:#000;border:none;border-bottom:1px solid #333;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px 4px;margin-bottom:12px;outline:none;">
      <textarea id="c-desc" placeholder="What is happening?" style="width:100%;background:#000;border:1px solid #222;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:14px;padding:8px;margin-bottom:12px;outline:none;min-height:60px;"></textarea>
      <button class="save" onclick="addCase()">SAVE CASE</button>
    </div>
    <div id="casesList"></div>
  </div>
</div>

<script>
const PASSWORD = "65870";
const RANK_COLORS = { RECRUIT:"#00ff41", AGENT:"#33bbff", SPECIALIST:"#ffcc00", COMMANDER:"#ff6600" };

function unlock(){
  if(document.getElementById('pw').value === PASSWORD){
    document.getElementById('lock').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('agentsTab').style.display = tab==='agents' ? 'block' : 'none';
  document.getElementById('casesTab').style.display = tab==='cases' ? 'block' : 'none';
}

function toggleForm(){ const f=document.getElementById('addForm'); f.style.display=f.style.display==='none'?'block':'none'; }
function toggleCaseForm(){ const f=document.getElementById('addCaseForm'); f.style.display=f.style.display==='none'?'block':'none'; }

function getAgents(){ return JSON.parse(localStorage.getItem('bold-agents')||'[]'); }
function saveAgents(a){ localStorage.setItem('bold-agents', JSON.stringify(a)); }
function getCases(){ return JSON.parse(localStorage.getItem('bold-cases')||'[]'); }
function saveCases(c){ localStorage.setItem('bold-cases', JSON.stringify(c)); }

function addAgent(){
  const name = document.getElementById('a-name').value.trim();
  const code = document.getElementById('a-code').value.trim();
  if(!name){ alert('Need a name!'); return; }
  const agents = getAgents();
  agents.unshift({ id: Date.now(), name, code, age: document.getElementById('a-age').value.trim(), school: document.getElementById('a-school').value.trim(), location: document.getElementById('a-location').value.trim(), rank: document.getElementById('a-rank').value, why: document.getElementById('a-why').value.trim(), date: new Date().toLocaleDateString() });
  saveAgents(agents);
  document.getElementById('addForm').style.display = 'none';
  loadAll();
}

function addCase(){
  const name = document.getElementById('c-name').value.trim();
  if(!name){ alert('Need a name!'); return; }
  const cases = getCases();
  cases.unshift({ id: Date.now(), name, school: document.getElementById('c-school').value.trim(), location: document.getElementById('c-location').value.trim(), desc: document.getElementById('c-desc').value.trim(), status: 'open', date: new Date().toLocaleDateString() });
  saveCases(cases);
  document.getElementById('addCaseForm').style.display = 'none';
  loadAll();
}

function promoteAgent(id){
  const agents = getAgents();
  const ranks = ['RECRUIT','AGENT','SPECIALIST','COMMANDER'];
  const a = agents.find(x=>x.id===id);
  if(a){ const i = ranks.indexOf(a.rank); if(i < ranks.length-1) a.rank = ranks[i+1]; }
  saveAgents(agents); loadAll();
}

function deleteAgent(id){ if(!confirm('Remove agent?')) return; saveAgents(getAgents().filter(x=>x.id!==id)); loadAll(); }
function setCaseStatus(id, status){ const cases=getCases(); const c=cases.find(x=>x.id===id); if(c) c.status=status; saveCases(cases); loadAll(); }
function deleteCase(id){ if(!confirm('Delete case?')) return; saveCases(getCases().filter(x=>x.id!==id)); loadAll(); }

function loadAll(){
  const agents = getAgents();
  const cases = getCases();

  document.getElementById('totalAgents').textContent = agents.length;
  document.getElementById('totalCases').textContent = cases.length;
  document.getElementById('activeCases').textContent = cases.filter(c=>c.status==='open').length;
  document.getElementById('solvedCases').textContent = cases.filter(c=>c.status==='solved').length;

  const al = document.getElementById('agentsList');
  if(agents.length === 0){ al.innerHTML = '<div class="empty">NO AGENTS YET — ADD YOUR FIRST RECRUIT</div>'; }
  else {
    al.innerHTML = agents.map(a => `
      <div class="card">
        <div class="card-top">
          <div class="card-name">${a.code || a.name}</div>
          <div class="card-rank" style="color:${RANK_COLORS[a.rank]||'#00ff41'};border-color:${RANK_COLORS[a.rank]||'#00ff41'}">${a.rank}</div>
        </div>
        <div class="card-detail"><span>REAL NAME:</span> ${a.name}</div>
        ${a.age ? `<div class="card-detail"><span>AGE:</span> ${a.age}</div>` : ''}
        ${a.school ? `<div class="card-detail"><span>SCHOOL:</span> ${a.school}</div>` : ''}
        ${a.location ? `<div class="card-detail"><span>LOCATION:</span> ${a.location}</div>` : ''}
        ${a.why ? `<div class="card-detail"><span>WHY:</span> ${a.why}</div>` : ''}
        <div class="card-detail"><span>ENLISTED:</span> ${a.date}</div>
        <div class="card-actions">
          <button class="act-btn" onclick="promoteAgent(${a.id})">↑ PROMOTE</button>
          <button class="act-btn del" onclick="deleteAgent(${a.id})">✕ REMOVE</button>
        </div>
      </div>`).join('');
  }

  const cl = document.getElementById('casesList');
  if(cases.length === 0){ cl.innerHTML = '<div class="empty">NO CASES YET</div>'; }
  else {
    cl.innerHTML = cases.map(c => {
      const color = c.status==='solved'?'#00ff41':c.status==='assigned'?'#ffcc00':'#ff3333';
      return `
      <div class="card" style="border-color:${color}22">
        <div class="card-top">
          <div class="card-name">${c.name}</div>
          <div class="card-rank" style="color:${color};border-color:${color}">${c.status.toUpperCase()}</div>
        </div>
        ${c.school ? `<div class="card-detail"><span>SCHOOL:</span> ${c.school}</div>` : ''}
        ${c.location ? `<div class="card-detail"><span>LOCATION:</span> ${c.location}</div>` : ''}
        ${c.desc ? `<div class="card-detail"><span>CASE:</span> ${c.desc}</div>` : ''}
        <div class="card-detail"><span>OPENED:</span> ${c.date}</div>
        <div class="card-actions">
          <button class="act-btn ${c.status==='open'?'active':''}" onclick="setCaseStatus(${c.id},'open')">OPEN</button>
          <button class="act-btn ${c.status==='assigned'?'active':''}" onclick="setCaseStatus(${c.id},'assigned')">ASSIGNED</button>
          <button class="act-btn ${c.status==='solved'?'active':''}" onclick="setCaseStatus(${c.id},'solved')">SOLVED</button>
          <button class="act-btn del" onclick="deleteCase(${c.id})">✕ DELETE</button>
        </div>
      </div>`;
    }).join('');
  }
}
</script>
</body>
</html>
