<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>B.O.L.D — Case Opened</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#fff;font-family:'Share Tech Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;}
.card{max-width:500px;}
h1{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#00ff41;letter-spacing:4px;margin-bottom:16px;}
.case-num{font-size:48px;font-weight:900;color:#fff;margin-bottom:20px;font-family:'Orbitron',monospace;}
p{color:#555;font-size:14px;line-height:2;margin-bottom:32px;}
a{display:inline-block;border:2px solid #00ff41;padding:12px 36px;color:#00ff41;font-size:13px;letter-spacing:4px;text-decoration:none;font-family:'Orbitron',monospace;}
.blink{animation:blink 1s infinite;font-size:40px;margin-bottom:24px;display:block;color:#00ff41;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
</style>
</head>
<body>
<div class="card">
  <span class="blink">●</span>
  <h1>CASE OPENED</h1>
  <p>Your case has been received by Director Oliver Vo. A B.O.L.D agent will be assigned to your location. You will be contacted soon.<br><br><span style="color:#00ff41;">No bully gets away. Not on our watch.</span></p>
  <a href="https://oliveryvo-cmd.github.io/bold/">RETURN TO BASE</a>
</div>
</body>
</html>
